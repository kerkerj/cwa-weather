name: CI
on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - .github/workflows/ci.yml
      - .golangci.yml
      - skill/**
  pull_request:
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - .github/workflows/ci.yml
      - .golangci.yml
      - skill/**

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -v ./...
      - run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: gosec ./...

  skill-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            skill:
              - "skill/**"
      - if: steps.filter.outputs.skill == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.filter.outputs.skill == 'true'
        run: pip install skill-scanner
      - if: steps.filter.outputs.skill == 'true'
        run: skill-scanner scan skill/
