name: CI
on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - .github/workflows/ci.yml
      - .golangci.yml
      - skill/**
  pull_request:
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - .github/workflows/ci.yml
      - .golangci.yml
      - skill/**

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -v -coverprofile=coverage.out ./...
      - run: go build ./...
      - name: Extract coverage
        id: coverage
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "total_num=${TOTAL%\%}" >> "$GITHUB_OUTPUT"
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.total }}
          valColorRange: ${{ steps.coverage.outputs.total_num }}
          minColorRange: 0
          maxColorRange: 100

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: gosec ./...

  skill-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            skill:
              - "skill/**"
      - if: steps.filter.outputs.skill == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.filter.outputs.skill == 'true'
        run: pip install skill-scanner
      - if: steps.filter.outputs.skill == 'true'
        run: skill-scanner scan skill/
