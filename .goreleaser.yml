version: 2
project_name: cwa-weather

builds:
  - main: ./cmd/cwa-weather
    binary: cwa-weather
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: kerkerj
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/kerkerj/cwa-weather"
    description: "CWA Open Data API CLI for Taiwan weather data"
    license: "MIT"
    install: |
      bin.install "cwa-weather"
    test: |
      system "#{bin}/cwa-weather", "--version"

changelog:
  sort: asc
